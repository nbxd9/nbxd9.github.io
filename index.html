<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stream Preview</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(80, 120, 255, 0.2), transparent 35%),
        linear-gradient(135deg, #080808, #151515 55%, #050505);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .page {
      width: 100%;
      max-width: 980px;
      text-align: center;
      animation: fadeIn 0.8s ease forwards;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 4rem);
      margin-bottom: 12px;
      font-weight: 800;
      letter-spacing: -1px;
      outline: none;
    }

    h1:focus {
      text-shadow: 0 0 18px rgba(255, 255, 255, 0.35);
    }

    .edit-link {
      display: inline-block;
      margin-bottom: 28px;
      color: #8ab4ff;
      font-size: 0.95rem;
      text-decoration: none;
      transition: color 0.25s ease, transform 0.25s ease;
    }

    .edit-link:hover {
      color: #ffffff;
      transform: translateY(-2px);
    }

    .stream-box {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.06), transparent 30%),
        #000;
      border-radius: 24px;
      overflow: hidden;
      cursor: pointer;
      box-shadow:
        0 30px 80px rgba(0, 0, 0, 0.6),
        0 0 0 1px rgba(255, 255, 255, 0.08);
      transition: transform 0.35s ease, box-shadow 0.35s ease;
    }

    .stream-box:hover {
      transform: scale(1.015);
      box-shadow:
        0 40px 100px rgba(0, 0, 0, 0.75),
        0 0 0 1px rgba(255, 255, 255, 0.14);
    }

    .stream-glow {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 50%, rgba(60, 120, 255, 0.2), transparent 38%);
      opacity: 0.8;
      animation: pulseGlow 3s ease-in-out infinite;
    }

    .stream-lines {
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.035),
        rgba(255,255,255,0.035) 1px,
        transparent 1px,
        transparent 8px
      );
      opacity: 0.22;
      pointer-events: none;
    }

    .play-button {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 86px;
      height: 86px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.28);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s ease, background 0.3s ease;
      animation: floatButton 2.4s ease-in-out infinite;
    }

    .play-button::before {
      content: "";
      margin-left: 6px;
      border-left: 24px solid white;
      border-top: 16px solid transparent;
      border-bottom: 16px solid transparent;
    }

    .stream-box:hover .play-button {
      background: rgba(255, 255, 255, 0.22);
      transform: translate(-50%, -50%) scale(1.08);
    }

    .stream-label {
      position: absolute;
      left: 18px;
      bottom: 18px;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 0.85rem;
      background: rgba(255, 255, 255, 0.12);
      color: rgba(255, 255, 255, 0.86);
      backdrop-filter: blur(8px);
    }

    .loading {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.78);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 18px;
      z-index: 5;
    }

    .loading.active {
      display: flex;
    }

    .spinner {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      border: 4px solid rgba(255, 255, 255, 0.2);
      border-top-color: #ffffff;
      animation: spin 1s linear infinite;
    }

    .loading p {
      color: rgba(255,255,255,0.82);
      font-size: 0.95rem;
      letter-spacing: 0.5px;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.72);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 20;
      backdrop-filter: blur(8px);
    }

    .modal-backdrop.active {
      display: flex;
      animation: fadeIn 0.25s ease forwards;
    }

    .modal {
      width: 100%;
      max-width: 430px;
      background: linear-gradient(180deg, #202020, #111111);
      border-radius: 24px;
      padding: 32px 26px;
      text-align: center;
      box-shadow: 0 30px 100px rgba(0, 0, 0, 0.75);
      border: 1px solid rgba(255,255,255,0.12);
      animation: modalPop 0.35s ease forwards;
    }

    .modal h2 {
      font-size: 1.6rem;
      margin-bottom: 12px;
    }

    .modal p {
      color: rgba(255,255,255,0.72);
      line-height: 1.5;
      margin-bottom: 24px;
    }

    .account-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 52px;
      border-radius: 14px;
      background: linear-gradient(135deg, #4f7cff, #7f5cff);
      color: #fff;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 12px 30px rgba(79, 124, 255, 0.35);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .account-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 40px rgba(79, 124, 255, 0.48);
    }

    .close-button {
      margin-top: 16px;
      background: none;
      border: none;
      color: rgba(255,255,255,0.6);
      font-size: 0.9rem;
      cursor: pointer;
    }

    .close-button:hover {
      color: #fff;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @keyframes modalPop {
      from {
        opacity: 0;
        transform: scale(0.92) translateY(18px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes pulseGlow {
      0%, 100% {
        opacity: 0.45;
      }
      50% {
        opacity: 0.95;
      }
    }

    @keyframes floatButton {
      0%, 100% {
        margin-top: 0;
      }
      50% {
        margin-top: -8px;
      }
    }

    @media (max-width: 600px) {
      body {
        padding: 16px;
      }

      .stream-box {
        border-radius: 16px;
      }

      .play-button {
        width: 68px;
        height: 68px;
      }

      .play-button::before {
        border-left-width: 19px;
        border-top-width: 13px;
        border-bottom-width: 13px;
      }

      .stream-label {
        left: 12px;
        bottom: 12px;
        font-size: 0.75rem;
      }

      .modal {
        padding: 28px 20px;
        border-radius: 20px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <h1 id="pageTitle" contenteditable="false">Live Stream</h1>

    <a href="#" class="edit-link" id="editTitleLink">
      Edit title
    </a>

    <section class="stream-box" id="streamBox">
      <div class="stream-glow"></div>
      <div class="stream-lines"></div>

      <div class="play-button" aria-label="Play stream"></div>

      <div class="stream-label">
        HD Stream Preview
      </div>

      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Loading stream...</p>
      </div>
    </section>
  </main>

  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <h2>Create an account</h2>
      <p>
        You should create an account to start watching.
      </p>

      <a
        class="account-button"
        href="https://trusthubmedia.com/app/aff/go/unzmnx?i=9"
        target="_blank"
        rel="noopener noreferrer"
      >
        Create an account
      </a>

      <button class="close-button" id="closeModal">
        Maybe later
      </button>
    </div>
  </div>

  <script>
    const editTitleLink = document.getElementById("editTitleLink");
    const pageTitle = document.getElementById("pageTitle");
    const streamBox = document.getElementById("streamBox");
    const loading = document.getElementById("loading");
    const modalBackdrop = document.getElementById("modalBackdrop");
    const closeModal = document.getElementById("closeModal");

    let isEditing = false;
    let isLoading = false;

    editTitleLink.addEventListener("click", function (event) {
      event.preventDefault();

      isEditing = !isEditing;
      pageTitle.contentEditable = isEditing;

      if (isEditing) {
        pageTitle.focus();
        editTitleLink.textContent = "Save title";

        const range = document.createRange();
        const selection = window.getSelection();

        range.selectNodeContents(pageTitle);
        range.collapse(false);

        selection.removeAllRanges();
        selection.addRange(range);
      } else {
        pageTitle.blur();
        editTitleLink.textContent = "Edit title";
      }
    });

    pageTitle.addEventListener("keydown", function (event) {
      if (event.key === "Enter") {
        event.preventDefault();
        isEditing = false;
        pageTitle.contentEditable = false;
        pageTitle.blur();
        editTitleLink.textContent = "Edit title";
      }
    });

    streamBox.addEventListener("click", function () {
      if (isLoading) return;

      isLoading = true;
      loading.classList.add("active");

      setTimeout(function () {
        loading.classList.remove("active");
        modalBackdrop.classList.add("active");
        isLoading = false;
      }, 2000);
    });

    closeModal.addEventListener("click", function () {
      modalBackdrop.classList.remove("active");
    });

    modalBackdrop.addEventListener("click", function (event) {
      if (event.target === modalBackdrop) {
        modalBackdrop.classList.remove("active");
      }
    });
  </script>
</body>
</html>
